modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "XiaoJin"
credits = "XiaoJin"
logoFile = "META-INF/pack.png"

description = '''
A visual gacha/loot display mod. When opening loot containers, displays the results in an animated slot-machine style reel interface instead of the standard inventory screen. Supports any loot table with customizable display entries, and features dramatic reveal animations with rarity-colored result indicators. Compatible with Lootr for lootable chests and RarityCore for custom rarity colors.
'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies.${ mod_id }]]
modId = "neoforge"
type = "required"
versionRange = "[${neo_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
